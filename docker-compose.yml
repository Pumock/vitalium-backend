services:
  vitalium-backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: vitalium-backend
    restart: unless-stopped
    ports:
      - '3000:3000'
    env_file:
      - .env.production
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./logs:/app/logs
      - ./uploads:/app/uploads
    command: >
      sh -c "
      npx prisma migrate deploy &&
      node dist/main
      "

  postgres:
    image: postgres:15-alpine
    container_name: vitalium-postgres
    restart: unless-stopped
    env_file:
      - .env.production
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $POSTGRES_USER -d $POSTGRES_DB']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: