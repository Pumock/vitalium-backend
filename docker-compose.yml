services:
  vitalium-backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: vitalium-backend
    restart: unless-stopped
    ports:
      - '3000:3000'
    env_file:
      - .env.production
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./logs:/app/logs
      - ./uploads:/app/uploads

  postgres:
    image: postgres:15-alpine
    container_name: vitalium-postgres
    restart: unless-stopped
    env_file:
      - .env.production
    volumes:
      - postgres_data:/var/lib/postgresql/data
