services:
  # Vitalium Backend Application - Development Mode
  vitalium-backend-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
      target: development
    container_name: vitalium-backend-dev
    restart: unless-stopped
    ports:
      - '3000:3000'
      - '9229:9229' # Debug port
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgresql://vitalium:vitalium123@postgres:5432/vitalium?schema=public
      - JWT_SECRET=your-super-secret-jwt-key-for-vitalium-backend-dev
      - LOG_LEVEL=debug
      - PORT=3000
      - ENABLE_METRICS=true
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./src:/app/src
      - ./prisma:/app/prisma
      - ./test:/app/test
      - ./logs:/app/logs
      - ./uploads:/app/uploads
      - /app/node_modules # Prevent overwriting node_modules
    networks:
      - vitalium-network
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:3000/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    command: npm run start:dev

  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: vitalium-postgres-dev
    restart: unless-stopped
    environment:
      - POSTGRES_DB=vitalium
      - POSTGRES_USER=vitalium
      - POSTGRES_PASSWORD=vitalium123
    ports:
      - '5432:5432'
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - vitalium-network
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U vitalium -d vitalium']
      interval: 10s
      timeout: 5s
      retries: 5

  # Prisma Studio (Database Admin UI)
  prisma-studio:
    build:
      context: .
      dockerfile: Dockerfile.dev
      target: development
    container_name: vitalium-prisma-studio
    ports:
      - '5555:5555'
    environment:
      - DATABASE_URL=postgresql://vitalium:vitalium123@postgres:5432/vitalium?schema=public
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./prisma:/app/prisma
    networks:
      - vitalium-network
    command: npx prisma studio --hostname 0.0.0.0

volumes:
  postgres_dev_data:
    driver: local

networks:
  vitalium-network:
    driver: bridge
