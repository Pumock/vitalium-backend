services:
  vitalium-backend-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: vitalium-backend-dev
    ports:
      - '3000:3000'
      - '9229:9229'
    env_file:
      - .env.development
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./src:/app/src
      - ./prisma:/app/prisma
      - ./test:/app/test
      - ./logs:/app/logs
      - ./uploads:/app/uploads
      - node_modules_cache:/app/node_modules
    command: >
      sh -c "
      npx prisma generate &&
      npx prisma migrate dev &&
      npm run start:dev
      "

  postgres:
    image: postgres:15-alpine
    container_name: vitalium-postgres-dev
    env_file:
      - .env.development
    ports:
      - '5432:5432'
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $POSTGRES_USER -d $POSTGRES_DB']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_dev_data:
  node_modules_cache: